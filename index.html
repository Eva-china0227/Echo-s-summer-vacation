<body>
<div class="container" id="mainContainer">
  <h1>🌻 Echo 2026年暑期打卡</h1>
  <div class="summer-badge">7.1 — 8.31</div>
  <div class="date-box">
    <span style="font-size:0.78rem;color:#8b6d4e;">📅</span>

    <button id="todayBtn">今天</button>

  <div id="weekdayReminder" class="weekday-tip"></div>
  <div id="danceReminder" class="dance-tip"></div>

  <!-- 猫咪框移到最上面 -->
  <div class="cat-progress-box" id="catProgressBox">
    <div class="cat-row">
      <div class="cat-container">
        <span class="cat-emoji" id="catEmoji">🐱</span>
      </div>
      <div class="cat-text-group">
        <div class="encouragement-text" id="encouragementText">新的一天，加油！</div>
        <div class="encouragement-sub" id="encouragementSub">猫咪在等你开始呢~</div>

    </div>
    <div class="progress-inner">
      <div class="progress-header"><span>✅ 今日进度</span><span id="progressText">0/12</span></div>
      <div class="bar-bg"><div id="progressFill" class="bar-fill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- 计时器面板 -->
  <div class="timer-panel">
    <div class="timer-row">
      <div class="timer-left">
        <span class="timer-label">⏳ 计时器</span>
        <span class="timer-display-box" id="timerDisplay">00:00</span>

        <button class="timer-btn" id="timerPauseBtn">⏸</button>
        <button class="timer-btn" id="timerResetBtn">↺</button>
      </div>
    </div>
    <div class="timer-row">
      <div class="timer-left">
        <span class="timer-label-2">&nbsp;⏲&nbsp;倒计时</span>
        <div class="countdown-wrap">
          <input type="number" class="countdown-input-box" id="countdownInput" value="20" min="1" inputmode="numeric">
          <span class="countdown-unit">分钟</span>
        </div>
      </div>
      <div class="timer-right">
        <button class="timer-btn" style="visibility:hidden;"></button>
        <button class="timer-btn" id="countdownBtn" style="width:44px;">开始</button>
        <button class="timer-btn" style="visibility:hidden;"></button>
      </div>
    </div>
  </div>

  <div id="taskListContainer" class="task-list"></div>
  <div class="action-row">
    <button class="btn" id="analysisBtn">📊 月度分析</button>
    <button class="btn" id="resetTodayBtn">🔄 重置今日</button>
  </div>
  <div id="analysisPanel" class="analysis-panel">
    <div class="month-selector"><button id="prevMonthBtn" class="timer-btn">◀</button><strong id="analysisMonthLabel" style="font-size:0.78rem;"></strong><button id="nextMonthBtn" class="timer-btn">▶</button></div>
    <div id="monthSummary" style="font-size:0.7rem;color:#5c3d1e;"></div>
    <div class="task-filter" id="taskFilterContainer"></div>
    <div class="legend" id="legendContainer"></div>
    <canvas id="monthChart"></canvas>
  </div>
  <div style="text-align:center; margin-top:10px; color:#b8906e;font-size:0.64rem;">☀️ 户外至少3小时 · 坚持就是胜利</div>
</div>

  }

  function getCatClass(cat){const m={english:'cat-english',chinese:'cat-chinese',calligraphy:'cat-calligraphy',math:'cat-math',sport:'cat-sport',dance:'cat-dance',outclass:'cat-outclass'};return m[cat]||'';}
  function getIdxClass(cat){const m={english:'idx-english',chinese:'idx-chinese',calligraphy:'idx-calligraphy',math:'idx-math',sport:'idx-sport',dance:'idx-dance',outclass:'idx-outclass'};return m[cat]||'';}
  function formatDuration(min){if(min<60)return min+'分钟';let h=Math.floor(min/60),m=min%60;return m>0?h+'h'+m+'min':h+'h';}
  function playGreatSound(){if(!audioCtx)audioCtx=new AudioContext();let now=audioCtx.currentTime;[0,0.1,0.2].forEach((d,i)=>{let o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='sine';let t=now+d;o.frequency.setValueAtTime(700+i*180,t);o.frequency.exponentialRampToValueAtTime(1000+i*180,t+0.07);g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.14);o.start(t);o.stop(t+0.14);});}
  function playUncheckSound(){if(!audioCtx)audioCtx=new AudioContext();let now=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='sine';o.frequency.setValueAtTime(500,now);o.frequency.exponentialRampToValueAtTime(300,now+0.1);g.gain.setValueAtTime(0.12,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.14);o.start(now);o.stop(now+0.14);}
  function playAlarmSound(){if(!audioCtx)audioCtx=new AudioContext();let now=audioCtx.currentTime;for(let i=0;i<5;i++){let o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='square';let t=now+i*0.28;o.frequency.setValueAtTime(800,t);o.frequency.setValueAtTime(600,t+0.1);g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.24);o.start(t);o.stop(t+0.24);}}
  function getTodayString(){let t=new Date(),s=formatDate(t);return s<SUMMER_START?SUMMER_START:s>SUMMER_END?SUMMER_END:s;}
  function formatDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  function isDateInSummer(s){return s>=SUMMER_START&&s<=SUMMER_END;}
  function getWeekday(d){return new Date(d+'T00:00:00').getDay();}
  function getTodayTasks(){let w=getWeekday(currentDateStr),t=[...BASE_TASKS];if(OUTCLASS_DAYS.includes(w))t.splice(5,0,OUTCLASS_TASK);if(DANCE_DAYS[w])t.push(DANCE_TASK);if(DANCE_BASIC_DAYS[w])t.push(DANCE_BASIC_TASK);return t;}
  const storage={load(){try{return JSON.parse(localStorage.getItem(STORAGE_DATA))||{};}catch{return{};}},save(d){localStorage.setItem(STORAGE_DATA,JSON.stringify(d));},getDay(d){return this.load()[d]||{tasks:{}};},set(d,id,c,m){if(!isDateInSummer(d))return;let a=this.load();if(!a[d])a[d]={tasks:{}};a[d].tasks[id]={completed:c,minutes:m||0};this.save(a);},resetDay(d){let a=this.load();delete a[d];this.save(a);}};
  function getMathHistory(){try{return JSON.parse(localStorage.getItem(MATH_STORAGE_KEY))||{};}catch{return{};}}
  function saveMathHistory(h){localStorage.setItem(MATH_STORAGE_KEY,JSON.stringify(h));}
  function getMathForDate(d){let h=getMathHistory();return h[d]||null;}
  function saveMathForDate(d,p){let h=getMathHistory();h[d]=p;saveMathHistory(h);}
  function generateRandomProblems(){let p=[],s=new Set();while(p.length<40){let add=Math.random()>0.4,pr;if(add){let a=Math.floor(Math.random()*90)+5,b=Math.floor(Math.random()*(100-a))+1;pr=a+'+'+b+'=___';}else{let a=Math.floor(Math.random()*99)+2,b=Math.floor(Math.random()*(a-1))+1;pr=a+'-'+b+'=___';}if(!s.has(pr)){s.add(pr);p.push(pr);}}return p;}
  function generateUniqueProblems(d){let s=getMathForDate(d);if(s&&s.length===40)return[...s];let p=generateRandomProblems();saveMathForDate(d,p);return p;}
  function regenerateProblems(){let p=generateRandomProblems();saveMathForDate(currentDateStr,p);mathProblems=p;renderMathInline();}
  const $=id=>document.getElementById(id);
  const dateDisplay=$('currentDateDisplay'),taskContainer=$('taskListContainer'),progressText=$('progressText'),progressFill=$('progressFill'),weekdayReminder=$('weekdayReminder'),danceReminder=$('danceReminder'),analysisPanel=$('analysisPanel'),analysisMonthLabel=$('analysisMonthLabel'),monthSummary=$('monthSummary'),chartCanvas=$('monthChart'),taskFilterContainer=$('taskFilterContainer'),legendContainer=$('legendContainer'),timerDisplay=$('timerDisplay'),prevBtn=$('prevDay'),nextBtn=$('nextDay'),catEmoji=$('catEmoji'),encouragementText=$('encouragementText'),encouragementSub=$('encouragementSub');

  function updateCatEncouragement(completed, total) {
    const e = getCatEncouragement(completed, total);
    catEmoji.textContent = e.cat;
    encouragementText.innerHTML = e.text;
    encouragementSub.textContent = e.sub;
    catEmoji.parentElement.style.animation = 'none';
    catEmoji.parentElement.offsetHeight;
    catEmoji.parentElement.style.animation = 'bounce 0.6s ease';
  }

  function updateTimerDisplay(){let m=Math.floor(timerSeconds/60),s=timerSeconds%60;timerDisplay.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}
  function stopTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null;}timerDisplay.classList.remove('alarm');}
  function startTimer(){stopTimer();timerInterval=setInterval(()=>{timerSeconds++;updateTimerDisplay();},1000);}
  function pauseTimer(){stopTimer();}
  function resetTimer(){stopTimer();timerSeconds=0;timerDisplay.classList.remove('alarm');updateTimerDisplay();}
  function startCountdown(min){stopTimer();timerSeconds=min*60;updateTimerDisplay();timerInterval=setInterval(()=>{if(timerSeconds<=0){stopTimer();timerDisplay.classList.add('alarm');playAlarmSound();setTimeout(()=>timerDisplay.classList.remove('alarm'),3000);return;}timerSeconds--;updateTimerDisplay();},1000);}
  $('timerStartBtn').addEventListener('click',startTimer);$('timerPauseBtn').addEventListener('click',pauseTimer);$('timerResetBtn').addEventListener('click',resetTimer);
  $('countdownBtn').addEventListener('click',()=>{let m=parseInt($('countdownInput').value,10);if(m>0)startCountdown(m);});

  function renderMathInline(){let g=document.getElementById('mathGridInline');if(!g)return;g.innerHTML='';mathProblems.forEach(p=>{let d=document.createElement('div');d.className='math-item';d.textContent=p;g.appendChild(d);});}
  function openPrintPreview(){
    let today=new Date();let dateStr=today.getFullYear()+'年'+(today.getMonth()+1)+'月'+today.getDate()+'日';
    let w=window.open('','_blank','width=390,height=600');
    let h='<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=390"><title>数学题</title><style>';
    h+='*{margin:0;padding:0}body{font-family:-apple-system,sans-serif;background:#f5f5f5;padding:12px}';
    h+='.card{background:white;border-radius:12px;padding:16px;max-width:400px;margin:0 auto}';
    h+='h2{text-align:center;font-size:16px;margin-bottom:6px}.date-info{text-align:center;font-size:12px;color:#888;margin-bottom:10px}';
    h+='.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}.item{background:#fafafa;padding:8px 2px;border:1px solid #e5e5ea;text-align:center;font-size:13px;border-radius:6px}';
    h+='.btn-row{display:flex;gap:8px;margin-top:14px;justify-content:center}';
    h+='.btn-print{background:#e8a450;border:none;padding:10px 24px;border-radius:20px;font-weight:600;color:white;font-size:14px;cursor:pointer}';
    h+='.btn-close{background:#e5e5ea;border:none;padding:10px 24px;border-radius:20px;font-weight:500;color:#1c1c1e;font-size:14px;cursor:pointer}';
    h+='@media print{body{background:white}.card{box-shadow:none;max-width:100%}.btn-row{display:none}}';
    h+='</style></head><body><div class="card"><h2>数学运算 (100以内)</h2><div class="date-info">'+dateStr+'</div><div class="grid">';
    mathProblems.forEach(p=>{h+='<div class="item">'+p+'</div>';});
    h+='</div><div class="btn-row"><button class="btn-close" onclick="window.close()">关闭</button><button class="btn-print" onclick="window.print()">打印</button></div></div></body></html>';
    w.document.write(h);w.document.close();w.focus();
  }

  function updateNavButtons(){prevBtn.disabled=(currentDateStr<=SUMMER_START);nextBtn.disabled=(currentDateStr>=SUMMER_END);}
  function renderReminders(){let w=getWeekday(currentDateStr);let ot=OUTCLASS_TIME[w]||'';weekdayReminder.style.display=ot?'flex':'none';if(ot)weekdayReminder.innerHTML='📌 '+ot;let dt='';if(DANCE_DAYS[w])dt='💃 舞蹈课 10:40-12:10';if(DANCE_BASIC_DAYS[w])dt='🩰 舞蹈基本功 18:30-20:00';danceReminder.style.display=dt?'flex':'none';if(dt)danceReminder.innerHTML=dt;}
  function renderTasks(){
    let dayData=storage.getDay(currentDateStr),tasksState=dayData.tasks||{},todayTasks=getTodayTasks();taskContainer.innerHTML='';
    let completedCount = 0;
    todayTasks.forEach((task,idx)=>{
      let state=tasksState[task.id]||{completed:false,minutes:0},c=state.completed===true,m=state.minutes||0,isMath=task.id==='math_practice',isDance=task.id==='dance',isDanceBasic=task.id==='dance_basic',isOut=task.id==='english_outclass';
      if(c) completedCount++;
      let catClass=getCatClass(task.cat||''),idxClass=getIdxClass(task.cat||'');
      let card=document.createElement('div');card.className='task-card '+catClass+' '+(c?'completed-card':'incomplete-card');
      let tag='';if(isOut)tag='<span style="font-size:0.55rem;color:#2d8a9a;">周一/周二</span>';if(isDance)tag='<span style="font-size:0.55rem;color:#b85a78;">周三/周日</span>';if(isDanceBasic)tag='<span style="font-size:0.55rem;color:#7b5ea7;">周四</span>';
      card.innerHTML='<div class="task-main-row"><div class="task-index '+idxClass+'">'+(idx+1)+'</div><div class="task-details"><div class="task-title">'+task.emoji+' '+task.title+'</div><div class="task-desc">'+task.desc+' <span style="color:#b8906e;">'+tag+'</span></div></div><div class="time-input-area"><input type="number" class="time-input" value="'+(m||'')+'" min="0" data-task-id="'+task.id+'"><span style="font-size:0.6rem;color:#8b6d4e;">分</span></div><button class="check-btn '+(c?'completed':'')+'" data-task-id="'+task.id+'">'+(c?'✓':'○')+'</button></div>'+(isMath?'<div class="math-actions"><button class="math-btn math-preview-btn">👁 预览</button><button class="math-btn math-regenerate-btn">🎲 换题</button><button class="math-btn math-print-btn">🖨 打印</button></div><div class="math-preview-inline"><div class="math-grid" id="mathGridInline"></div></div>':'');
      let cb=card.querySelector('.check-btn'),ti=card.querySelector('.time-input');
      cb.addEventListener('click',e=>{e.stopPropagation();let nc=!c;storage.set(currentDateStr,task.id,nc,parseInt(ti.value,10)||0);nc?playGreatSound():playUncheckSound();renderAll();});
      ti.addEventListener('change',()=>{storage.set(currentDateStr,task.id,c,parseInt(ti.value,10)||0);renderAll();});
      if(isMath){let pb=card.querySelector('.math-preview-btn'),rb=card.querySelector('.math-regenerate-btn'),prb=card.querySelector('.math-print-btn'),pv=card.querySelector('.math-preview-inline');pb.addEventListener('click',e=>{e.stopPropagation();pv.classList.toggle('show');if(pv.classList.contains('show'))renderMathInline();});rb.addEventListener('click',e=>{e.stopPropagation();regenerateProblems();if(pv.classList.contains('show'))renderMathInline();rb.style.background='#f0d090';setTimeout(()=>rb.style.background='',300);});prb.addEventListener('click',e=>{e.stopPropagation();openPrintPreview();});}
      taskContainer.appendChild(card);
    });
    progressText.textContent=completedCount+'/'+todayTasks.length;
    progressFill.style.width=(completedCount/todayTasks.length*100)+'%';
    updateCatEncouragement(completedCount, todayTasks.length);
  }
  function renderAll(){dateDisplay.textContent=currentDateStr.slice(5,7)+'月'+currentDateStr.slice(8,10)+'日';updateNavButtons();renderReminders();mathProblems=generateUniqueProblems(currentDateStr);renderTasks();}
  function changeDate(d){let dt=new Date(currentDateStr+'T00:00:00');dt.setDate(dt.getDate()+d);let ns=formatDate(dt);if(isDateInSummer(ns)){currentDateStr=ns;renderAll();}}
  $('prevDay').addEventListener('click',()=>changeDate(-1));$('nextDay').addEventListener('click',()=>changeDate(1));$('todayBtn').addEventListener('click',()=>{currentDateStr=getTodayString();renderAll();});$('resetTodayBtn').addEventListener('click',()=>{if(confirm('重置今日？')){storage.resetDay(currentDateStr);renderAll();}});
  function getMonthDays(y,m){let d=new Date(y,m,0).getDate();return Array.from({length:d},(_,i)=>y+'-'+String(m).padStart(2,'0')+'-'+String(i+1).padStart(2,'0')).filter(isDateInSummer);}
  function getAllTasks(){return[...BASE_TASKS,OUTCLASS_TASK,DANCE_TASK,DANCE_BASIC_TASK];}
  function drawMultiChart(dates,ds){
    if(!chartCanvas||dates.length===0)return;let ctx=chartCanvas.getContext('2d');
    chartCanvas.width=Math.max(340,window.innerWidth*0.9);chartCanvas.height=240;ctx.clearRect(0,0,chartCanvas.width,240);
    let pad={top:36,right:14,bottom:36,left:38},cw=chartCanvas.width-pad.left-pad.right,ch=240-pad.top-pad.bottom,gm=1;
    ds.forEach(s=>{let m=Math.max(...s.values,0);if(m>gm)gm=m;});
    ctx.strokeStyle='#e0cc9e';ctx.lineWidth=0.5;
    for(let i=0;i<=4;i++){let y=pad.top+(ch/4)*i;ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(chartCanvas.width-pad.right,y);ctx.stroke();ctx.fillStyle='#b8906e';ctx.font='9px sans-serif';ctx.fillText(Math.round(gm*(4-i)/4),2,y+4);}
    ds.forEach(s=>{
      if(dates.length===0)return;let bw=Math.max(4,cw/dates.length-2);
      ctx.fillStyle=s.color;ctx.strokeStyle=s.color;ctx.lineWidth=2;
      ctx.beginPath();
      dates.forEach((d,i)=>{
        let x=pad.left+i*(bw+2)+bw/2,h=(s.values[i]/gm)*ch,y=pad.top+ch-h;
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      });
      ctx.stroke();
      dates.forEach((d,i)=>{
        let x=pad.left+i*(bw+2)+bw/2,h=(s.values[i]/gm)*ch,y=pad.top+ch-h;
        ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle=s.color;ctx.fill();
        if(s.values[i]>0){
          ctx.fillStyle='#3d2815';ctx.font='bold 10px sans-serif';
          ctx.fillText(s.values[i],x-10,y-8);
        }
      });
    });
    ctx.fillStyle='#8b6d4e';ctx.font='8px sans-serif';
    dates.forEach((d,i)=>{if(i%Math.ceil(dates.length/10)===0){let bw=Math.max(4,cw/dates.length-2),x=pad.left+i*(bw+2)+bw/2;ctx.fillText(d.slice(-2),x-6,230);}});
    ctx.fillText('分',2,20);
  }
  function updateAnalysis(){let [y,m]=analysisYearMonth.split('-').map(Number);analysisMonthLabel.textContent=y+'年'+m+'月';let dates=getMonthDays(y,m),all=storage.load(),sh='';if(selectedTaskFilters.includes('all')){let tm=0,vals=dates.map(d=>{let tasks=all[d]?.tasks||{},w=getWeekday(d),dt=[...BASE_TASKS];if(OUTCLASS_DAYS.includes(w))dt.splice(5,0,OUTCLASS_TASK);if(DANCE_DAYS[w])dt.push(DANCE_TASK);if(DANCE_BASIC_DAYS[w])dt.push(DANCE_BASIC_TASK);let dm=0;dt.forEach(t=>{dm+=tasks[t.id]?.minutes||0;});tm+=dm;return dt.filter(t=>tasks[t.id]?.completed).length;}),sum=vals.reduce((a,b)=>a+b,0);sh='打卡 <b>'+sum+'</b> 次 · 日均 '+(sum/dates.length||0).toFixed(1)+' 项<br>时长 <b>'+formatDuration(tm)+'</b> ('+tm+'分)';drawMultiChart(dates,[{label:'全部',color:'#e8a450',values:vals}]);renderLegend([{label:'全部打卡',color:'#e8a450'}]);}else{let ds=[],li=[],ta=0;selectedTaskFilters.forEach(tid=>{let task=getAllTasks().find(t=>t.id===tid);if(!task)return;let vals=dates.map(d=>all[d]?.tasks?.[tid]?.minutes||0),sum=vals.reduce((a,b)=>a+b,0);ta+=sum;let col=TASK_COLORS[getAllTasks().indexOf(task)%TASK_COLORS.length];ds.push({label:task.title,color:col,values:vals});li.push({label:task.emoji+task.title,color:col});});sh='合计 <b>'+formatDuration(ta)+'</b> ('+ta+'分) · '+selectedTaskFilters.length+' 项';drawMultiChart(dates,ds);renderLegend(li);}monthSummary.innerHTML=sh;renderFilters();}
  function renderLegend(items){legendContainer.innerHTML='';items.forEach(i=>{let d=document.createElement('div');d.className='legend-item';d.innerHTML='<div class="legend-color" style="background:'+i.color+'"></div><span>'+i.label+'</span>';legendContainer.appendChild(d);});}
  function toggleFilter(fid){if(fid==='all'){selectedTaskFilters=['all'];}else{selectedTaskFilters=selectedTaskFilters.filter(f=>f!=='all');let i=selectedTaskFilters.indexOf(fid);i>-1?selectedTaskFilters.splice(i,1):selectedTaskFilters.push(fid);if(selectedTaskFilters.length===0)selectedTaskFilters=['all'];}updateAnalysis();}
  function renderFilters(){taskFilterContainer.innerHTML='';let ac=document.createElement('span');ac.className='filter-chip'+(selectedTaskFilters.includes('all')?' active':'');ac.textContent='全部';ac.addEventListener('click',()=>toggleFilter('all'));taskFilterContainer.appendChild(ac);getAllTasks().forEach(t=>{let c=document.createElement('span');c.className='filter-chip'+(selectedTaskFilters.includes(t.id)?' active':'');c.textContent=t.emoji+' '+t.title;c.addEventListener('click',()=>toggleFilter(t.id));taskFilterContainer.appendChild(c);});}
  $('analysisBtn').addEventListener('click',()=>{if(analysisPanel.classList.contains('show'))analysisPanel.classList.remove('show');else{analysisPanel.classList.add('show');updateAnalysis();}});
  $('prevMonthBtn').addEventListener('click',()=>{analysisYearMonth=analysisYearMonth==='2026-07'?'2026-08':'2026-07';updateAnalysis();});
  $('nextMonthBtn').addEventListener('click',()=>{analysisYearMonth=analysisYearMonth==='2026-07'?'2026-08':'2026-07';updateAnalysis();});
  renderAll();
})();
