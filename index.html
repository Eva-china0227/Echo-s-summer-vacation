<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
  <title>🌞 Echo的暑期打卡</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'PingFang SC', 'Noto Sans', system-ui, sans-serif;
      min-height: 100vh; background: #fef9f0; overflow-x: hidden;
      -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased;
    }
    /* 封面（完整保留） */
    #coverPage {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #fef6e8 0%, #fce8d0 40%, #f5d4b8 100%);
      transition: opacity 0.8s, transform 0.8s; padding: 30px 24px; text-align: center;
    }
    #coverPage.hidden { opacity: 0; transform: scale(1.05); pointer-events: none; }
    .cover-badge {
      font-size: 0.8rem; color: #b8753e; background: rgba(255,248,235,0.7); backdrop-filter: blur(4px);
      padding: 4px 16px; border-radius: 20px; border: 1px solid rgba(200,160,100,0.3);
      margin-bottom: 10px; font-weight: 600;
    }
    .cover-cat-wrap { position: relative; margin-bottom: 4px; animation: floatCat 3.5s ease-in-out infinite; }
    @keyframes floatCat { 0%,100%{transform:translateY(0) rotate(-1deg);} 50%{transform:translateY(-16px) rotate(2deg);} }
    .cover-cat { font-size: 6.5rem; display: block; filter: drop-shadow(0 8px 24px rgba(200,120,60,0.2)); }
    .cat-bow { position: absolute; top: 8px; right: -8px; font-size: 2rem; animation: bowWiggle 2s ease-in-out infinite; }
    @keyframes bowWiggle { 0%,100%{transform:rotate(-8deg);} 50%{transform:rotate(8deg);} }
    .cat-hearts { position: absolute; font-size: 1.2rem; pointer-events: none; }
    .heart1 { top: -12px; left: -20px; animation: heartFloat 3s infinite; }
    .heart2 { bottom: -8px; right: -24px; animation: heartFloat 3.2s infinite 0.6s; }
    .heart3 { top: 20px; right: -30px; animation: heartFloat 2.8s infinite 1.2s; font-size:1rem; }
    @keyframes heartFloat { 0%,100%{opacity:0.4;transform:scale(0.8) rotate(0deg);} 50%{opacity:1;transform:scale(1.2) rotate(15deg);} }
    .cover-title { font-size: 2rem; font-weight: 800; color: #3d2815; margin-bottom: 2px; }
    .highlight {
      background: linear-gradient(135deg, #f5a623, #e8822a);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .cover-sub { font-size: 0.95rem; color: #8b6d4e; margin-bottom: 14px; }
    .cover-stars { font-size: 1.2rem; letter-spacing: 8px; margin-bottom: 14px; }
    .cover-btn {
      background: linear-gradient(135deg, #f5a623, #e8822a); border: none; border-radius: 30px;
      padding: 14px 44px; font-size: 1.1rem; font-weight: 700; color: white; cursor: pointer;
      box-shadow: 0 6px 24px rgba(232,130,42,0.35); transition: transform 0.2s; position: relative; overflow: hidden;
    }
    .cover-btn:active { transform: scale(0.94); }
    .btn-shine {
      position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.25) 0%, transparent 60%);
      opacity: 0; transition: opacity 0.4s; pointer-events: none;
    }
    .cover-btn:active .btn-shine { opacity: 1; }
    .cover-foot { position: absolute; bottom: 22px; font-size: 0.7rem; color: #c4a88a; letter-spacing: 3px; }
    .cover-deco {
      position: absolute; font-size: 1.4rem; opacity: 0.5; animation: twinkle 4s infinite; pointer-events: none;
    }
    @keyframes twinkle {
      0%,100%{opacity:0.3;transform:translateY(0) scale(1) rotate(0deg);}
      50%{opacity:0.8;transform:translateY(-10px) scale(1.15) rotate(10deg);}
    }
    .deco1{top:10%;left:8%;} .deco2{top:16%;right:10%;animation-delay:1.2s;}
    .deco3{bottom:28%;left:6%;animation-delay:2.4s;} .deco4{bottom:20%;right:6%;animation-delay:0.6s;}
    .deco5{top:48%;left:4%;animation-delay:1.8s;font-size:1rem;} .deco6{top:42%;right:4%;animation-delay:3s;font-size:1rem;}
    .deco7{top:70%;left:12%;animation-delay:0.3s;font-size:0.9rem;} .deco8{top:75%;right:12%;animation-delay:1.5s;font-size:0.9rem;}

    /* 主界面 */
    #mainApp {
      opacity: 0; transition: opacity 0.6s 0.2s; padding: 14px 10px 28px;
      display: flex; flex-direction: column; align-items: center; min-height: 100vh;
      background: linear-gradient(170deg, #fef9f0 0%, #fdf3e0 30%, #fce8cc 100%);
    }
    #mainApp.show { opacity: 1; }
    .container {
      max-width: 420px; width: 100%; background: #fffefb; border-radius: 28px;
      padding: 20px 14px 16px; box-shadow: 0 2px 12px rgba(140,100,40,0.06), 0 8px 32px rgba(140,100,40,0.10);
    }
    h1 { font-size: 1.4rem; text-align: center; color: #3d2815; font-weight: 700; }
    .summer-badge {
      text-align: center; font-weight: 600; color: #b8753e; background: linear-gradient(135deg, #fef5e8, #fde8cc);
      border-radius: 10px; padding: 4px 14px; margin: 5px auto 10px; width: fit-content; font-size: 0.8rem;
    }
    .date-box {
      background: #fffefb; border-radius: 16px; padding: 10px 14px; display: flex; align-items: center;
      justify-content: space-between; gap: 6px; margin: 8px 0 10px; border: 1px solid #ecd9b0;
    }
    .date-nav button, #todayBtn {
      background: #fffefb; border: 1px solid #d4b87a; border-radius: 10px; padding: 6px 12px;
      font-weight: 600; font-size: 0.8rem; color: #5c3d1e; cursor: pointer;
    }
    .date-nav button:disabled { opacity: 0.3; }
    #currentDateDisplay { min-width: 96px; text-align: center; font-weight: 700; color: #3d2815; }
    .reminder {
      border-radius: 12px; padding: 8px 12px; margin-bottom: 8px; font-weight: 600;
      display: flex; align-items: center; gap: 5px; font-size: 0.85rem;
    }
    .reminder.blue { background: #e8f0fa; color: #3a5a8c; border: 1px solid #c8daf0; }
    .reminder.pink { background: #fde8f0; color: #7a3050; border: 1px solid #f0c0d5; }

    /* 猫咪进度 */
    .cat-progress {
      background: linear-gradient(135deg, #fef9f0, #fdf0d8); border-radius: 16px;
      padding: 16px; margin: 8px 0 12px; border: 1px solid #e8d5b0;
    }
    .cat-row { display: flex; align-items: center; justify-content: flex-start; gap: 14px; margin-bottom: 10px; }
    .cat-emoji { font-size: 3.2rem; }
    .enc-text { font-weight: 700; font-size: 1rem; color: #5c3d1e; }
    .enc-sub { font-size: 0.78rem; color: #8b6d4e; margin-top: 2px; }
    .progress-inner { padding-top: 10px; border-top: 1px solid #e8d5b0; }
    .progress-header { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 6px; color: #5c3d1e; }
    .bar-bg { height: 12px; background: #e8d5b0; border-radius: 6px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, #e8a450, #d4892e); transition: 0.4s; border-radius: 6px; width: 0%; }

    /* 计时器面板 */
    .timer-panel {
      background: #fffefb; border-radius: 18px; padding: 14px; margin: 8px 0 12px;
      border: 1px solid #e8d5b0; box-shadow: 0 2px 8px rgba(140,100,40,0.06);
    }
    .timer-row { display: flex; align-items: center; margin-bottom: 10px; gap: 8px; }
    .timer-row:last-child { margin-bottom: 0; }
    .timer-label { font-weight: 700; font-size: 0.85rem; color: #5c3d1e; width: 70px; text-align: right; flex-shrink: 0; }
    .timer-display, .countdown-input {
      font-size: 1.7rem; font-weight: 700; font-family: monospace; background: #fffefb;
      border-radius: 12px; width: 96px; text-align: center; padding: 6px 0;
      border: 1px solid #d4b87a; color: #3d2815; flex-shrink: 0;
    }
    .timer-display.alarm { animation: blink 0.4s 6; background: #fff0f0; color: #cc0000; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    .countdown-input { width: 100%; }
    .countdown-wrapper { position: relative; width: 96px; flex-shrink: 0; }
    .countdown-unit {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      font-size: 0.75rem; color: #8b6d4e; font-weight: 600; pointer-events: none;
    }
    .timer-right { display: grid; grid-template-columns: repeat(3, 36px); gap: 6px; flex-shrink: 0; }
    .timer-btn {
      background: linear-gradient(180deg, #fef5e2, #f7e1b8); border: 1px solid #c9a55c;
      border-radius: 10px; font-weight: 700; font-size: 0.8rem; cursor: pointer;
      color: #5c3d1e; display: flex; align-items: center; justify-content: center;
      width: 100%; height: 32px;
    }

    /* 任务列表 */
    .task-list { display: flex; flex-direction: column; gap: 8px; margin: 12px 0; }
    .task-card {
      background: #fffefb; border-radius: 14px; padding: 11px 12px; border: 1px solid #ecd9b0;
      transition: all 0.2s; position: relative;
    }
    .task-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; border-radius: 0 2px 2px 0;
    }
    .completed-card { background: #f4faf0; border-color: #b8d88a; }
    .completed-card::before { background: #7ab85c; }
    .incomplete-card { background: #fefaf6; border-color: #e8c8a8; }
    .incomplete-card::before { background: #d4956b; }
    .task-main-row { display: flex; align-items: center; gap: 10px; }
    .task-index {
      width: 26px; height: 26px; border-radius: 7px; color: white; display: flex;
      align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0;
    }
    .task-title { font-weight: 700; font-size: 0.9rem; }
    .task-desc { font-size: 0.75rem; color: #8b6d4e; }
    .time-input {
      width: 48px; padding: 4px; border-radius: 8px; border: 1px solid #d4b87a;
      background: #fefaf3; text-align: center; font-weight: 600; font-size: 0.8rem;
    }
    .check-btn {
      width: 36px; height: 36px; border-radius: 50%; border: 2px solid #d4b87a;
      background: #fefaf3; font-size: 1.2rem; display: flex; align-items: center;
      justify-content: center; cursor: pointer; color: #b89050; font-weight: 700;
      transition: all 0.2s; flex-shrink: 0;
    }
    .check-btn.completed { background: #7ab85c; border-color: #5a9440; color: white; }
    .delete-btn {
      width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid #d4b87a;
      background: #fefaf3; font-size: 0.85rem; display: flex; align-items: center;
      justify-content: center; cursor: pointer; color: #b89050; margin-left: 4px;
      transition: all 0.2s; opacity: 0.6; flex-shrink: 0;
    }
    .delete-btn:active { opacity: 1; background: #fde8e8; border-color: #d4786b; color: #d4786b; }

    /* 自定义确认弹窗 */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 3000;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(2px);
    }
    .modal-box {
      background: white; border-radius: 20px; padding: 24px 20px;
      width: 280px; text-align: center; box-shadow: 0 12px 30px rgba(0,0,0,0.2);
    }
    .modal-box p { margin-bottom: 20px; font-weight: 600; color: #3d2815; }
    .modal-buttons { display: flex; gap: 12px; justify-content: center; }
    .modal-btn {
      padding: 10px 24px; border-radius: 12px; font-weight: 700; cursor: pointer;
      border: none; font-size: 0.9rem;
    }
    .modal-btn.cancel { background: #e5e5ea; color: #1c1c1e; }
    .modal-btn.confirm { background: #d4786b; color: white; }

    /* 数学 */
    .math-actions { display: flex; gap: 6px; margin-top: 8px; padding-top: 8px; border-top: 1px dashed #e0cc9e; }
    .math-btn {
      background: linear-gradient(180deg, #fef5e2, #f7e1b8); border: 1px solid #c9a55c;
      border-radius: 10px; padding: 6px 10px; font-weight: 600; font-size: 0.75rem; cursor: pointer;
    }
    .math-preview { display: none; background: #fafdf5; border-radius: 10px; padding: 8px; margin-top: 6px; }
    .math-preview.show { display: block; }
    .math-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
    .math-item {
      background: #fffefb; padding: 4px 2px; text-align: center; border-radius: 5px;
      font-size: 0.7rem; font-weight: 600; border: 1px solid #e0cc9e;
      overflow: visible; white-space: nowrap;
    }

    .action-row { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
    .btn {
      background: linear-gradient(180deg, #fef5e2, #f7e1b8); border: 1px solid #c9a55c;
      padding: 10px 18px; border-radius: 14px; font-weight: 700; cursor: pointer; font-size: 0.85rem; color: #5c3d1e;
    }
    .analysis-panel {
      background: #fffefb; border-radius: 16px; padding: 14px; margin-top: 10px;
      border: 1px solid #e8d5b0; display: none;
    }
    .analysis-panel.show { display: block; }
    .month-selector { 
      display: flex; gap: 8px; align-items: center; justify-content: center; margin: 4px 0 8px; 
    }
    .month-selector strong { 
      font-size: 1.1rem; min-width: 100px; text-align: center; white-space: nowrap; 
    }
    .summary-bar {
      background: #f8f2e8; border-radius: 10px; padding: 8px 12px; margin-bottom: 8px;
      text-align: center; font-size: 0.85rem; color: #5c3d1e;
    }
    .filter-area { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin: 6px 0; }
    .filter-chip {
      background: #fdf3de; border: 1px solid #d4b87a; border-radius: 20px;
      padding: 4px 12px; font-size: 0.7rem; cursor: pointer; font-weight: 600; color: #5c3d1e; transition: all 0.2s;
    }
    .filter-chip.active { background: #e8a450; color: white; border-color: #c9802a; }
    .legend { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 4px 0 6px; font-size: 0.7rem; }
    .legend-item { display: flex; align-items: center; gap: 4px; }
    .legend-color { width: 12px; height: 12px; border-radius: 3px; }
    canvas { width: 100%; height: auto; background: #fffefb; border-radius: 10px; border: 1px solid #f0e8d8; }
    .footer-tip { text-align: center; margin-top: 12px; color: #b8906e; font-size: 0.75rem; }
  </style>
</head>
<body>

<!-- 封面 -->
<div id="coverPage">
  <span class="cover-deco deco1">🌸</span><span class="cover-deco deco2">🌻</span>
  <span class="cover-deco deco3">✨</span><span class="cover-deco deco4">🌈</span>
  <span class="cover-deco deco5">⭐</span><span class="cover-deco deco6">🎀</span>
  <span class="cover-deco deco7">🌺</span><span class="cover-deco deco8">🦋</span>
  <div class="cover-badge">☀️ 2026 暑期</div>
  <div class="cover-cat-wrap">
    <span class="cover-cat">🐱</span><span class="cat-bow">🎀</span>
    <span class="cat-hearts heart1">❤️</span><span class="cat-hearts heart2">💕</span><span class="cat-hearts heart3">✨</span>
  </div>
  <div class="cover-title">Echo的<br><span class="highlight">暑期打卡</span></div>
  <div class="cover-sub">和小猫咪一起，每天进步一点点 ✨</div>
  <div class="cover-stars">⭐ 🌟 ⭐ 🌟 ⭐</div>
  <button class="cover-btn" id="enterBtn">开始打卡 🚀<span class="btn-shine"></span></button>
  <div class="cover-foot">🐾 坚持就是胜利 🐾</div>
</div>

<!-- 主界面 -->
<div id="mainApp">
  <div class="container">
    <h1>🌻 Echo 2026年暑期打卡</h1>
    <div class="summer-badge">6.24 — 8.28</div>
    <div class="date-box">
      <span>📅</span>
      <div class="date-nav">
        <button id="prevDay">◀</button><span id="currentDateDisplay"></span><button id="nextDay">▶</button>
      </div>
      <button id="todayBtn">今天</button>
    </div>
    <div id="weekdayReminder" class="reminder blue"></div>
    <div id="danceReminder" class="reminder pink"></div>

    <div class="cat-progress">
      <div class="cat-row">
        <span class="cat-emoji" id="catEmoji">🐱</span>
        <div>
          <div class="enc-text" id="encouragementText">新的一天，加油！</div>
          <div class="enc-sub" id="encouragementSub">猫咪在等你开始呢~</div>
        </div>
      </div>
      <div class="progress-inner">
        <div class="progress-header"><span>✅ 今日进度</span><span id="progressText">0/12</span></div>
        <div class="bar-bg"><div id="progressFill" class="bar-fill" style="width:0%"></div></div>
      </div>
    </div>

    <div class="timer-panel">
      <div class="timer-row">
        <span class="timer-label">⏳ 计时器</span>
        <span class="timer-display" id="timerDisplay">00:00</span>
        <div class="timer-right">
          <button class="timer-btn" id="timerStartBtn">▶</button>
          <button class="timer-btn" id="timerPauseBtn">⏸</button>
          <button class="timer-btn" id="timerResetBtn">↺</button>
        </div>
      </div>
      <div class="timer-row">
        <span class="timer-label">⏲ 倒计时</span>
        <div class="countdown-wrapper">
          <input type="number" class="countdown-input" id="countdownInput" value="20" min="1">
          <span class="countdown-unit">分钟</span>
        </div>
        <div class="timer-right">
          <button class="timer-btn" style="visibility:hidden;"></button>
          <button class="timer-btn" id="countdownBtn">开始</button>
          <button class="timer-btn" style="visibility:hidden;"></button>
        </div>
      </div>
    </div>

    <div id="taskListContainer" class="task-list"></div>

    <div class="action-row">
      <button class="btn" id="analysisBtn">📊 月度分析</button>
      <button class="btn" id="resetTodayBtn">🔄 重置今日</button>
    </div>

    <div id="analysisPanel" class="analysis-panel">
      <div class="month-selector">
        <button id="prevMonthBtn" class="timer-btn">◀</button>
        <strong id="analysisMonthLabel"></strong>
        <button id="nextMonthBtn" class="timer-btn">▶</button>
      </div>
      <div class="summary-bar" id="monthSummary"></div>
      <div class="filter-area" id="taskFilterContainer"></div>
      <div class="legend" id="legendContainer"></div>
      <canvas id="monthChart"></canvas>
    </div>
    <div class="footer-tip">☀️ 户外至少3小时 · 坚持就是胜利</div>
  </div>
</div>

<!-- 自定义确认弹窗 -->
<div id="confirmModal" style="display:none;" class="modal-overlay">
  <div class="modal-box">
    <p id="confirmText">确定要删除吗？</p>
    <div class="modal-buttons">
      <button class="modal-btn cancel" id="confirmCancel">取消</button>
      <button class="modal-btn confirm" id="confirmOk">确定</button>
    </div>
  </div>
</div>

<script>
(function() {
  // 音效
  function playGreat() { try { let ctx = new (window.AudioContext||window.webkitAudioContext)(); let t = ctx.currentTime; [0,0.1,0.2].forEach((d,i)=>{ let o=ctx.createOscillator(),g=ctx.createGain(); o.connect(g);g.connect(ctx.destination); o.type='sine'; o.frequency.setValueAtTime(700+i*180, t+d); g.gain.setValueAtTime(0.15, t+d); g.gain.exponentialRampToValueAtTime(0.01, t+d+0.15); o.start(t+d); o.stop(t+d+0.15); }); } catch(e) {} }
  function playUncheck() { try { let ctx = new (window.AudioContext||window.webkitAudioContext)(); let n=ctx.currentTime; let o=ctx.createOscillator(),g=ctx.createGain(); o.connect(g);g.connect(ctx.destination); o.type='sine'; o.frequency.setValueAtTime(500,n); o.frequency.exponentialRampToValueAtTime(300,n+0.1); g.gain.setValueAtTime(0.1,n); g.gain.exponentialRampToValueAtTime(0.01,n+0.15); o.start(n); o.stop(n+0.15); } catch(e) {} }

  document.getElementById('enterBtn').addEventListener('click', function() {
    this.style.transform='scale(0.94)';
    setTimeout(()=>{ this.style.transform=''; },150);
    setTimeout(()=>{
      document.getElementById('coverPage').classList.add('hidden');
      document.getElementById('mainApp').classList.add('show');
      renderAll();
    },150);
  });

  const SUMMER_START='2026-06-24', SUMMER_END='2026-08-28';
  const BASE_TASKS = [
    {id:'chinese_read_1',title:'语文阅读(一)',desc:'20分钟',emoji:'📘',cat:'chinese'},
    {id:'chinese_read_2',title:'语文阅读(二)',desc:'20分钟',emoji:'📘',cat:'chinese'},
    {id:'writing_video',title:'书法视频',desc:'20分钟',emoji:'🎬',cat:'calligraphy'},
    {id:'chinese_write_1',title:'汉字书写(一)',desc:'20分钟',emoji:'✍️',cat:'chinese'},
    {id:'chinese_write_2',title:'汉字书写(二)',desc:'20分钟',emoji:'✍️',cat:'chinese'},
    {id:'english_read',title:'英语阅读',desc:'1-2本',emoji:'📖',cat:'english'},

  function drawChart(dates, datasets) {
    if (!els.chart || dates.length===0) return;
    let ctx = els.chart.getContext('2d');
    let dpr = 2, width = Math.min(400, els.chart.parentElement.clientWidth);
    let chartPaddingX = 10;
    els.chart.width = (width - chartPaddingX*2) * dpr;
    els.chart.height = 220 * dpr;
    els.chart.style.width = (width - chartPaddingX*2) + 'px';
    els.chart.style.height = '220px';
    els.chart.style.marginLeft = chartPaddingX + 'px';
    els.chart.style.marginRight = chartPaddingX + 'px';
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, width - chartPaddingX*2, 220);
    let pad = {top:36, right:16, bottom:32, left:50};
    let cw = (width - chartPaddingX*2) - pad.left - pad.right, ch = 220 - pad.top - pad.bottom;
    let maxVal = 1;
    datasets.forEach(ds => { let m = Math.max(...ds.values,0); if(m>maxVal) maxVal=m; });
    if (maxVal===0) maxVal=1;
    let step = 1;
    if (maxVal > 5) { let raw = maxVal/4; step = raw<=1?1:raw<=2?2:raw<=5?5:raw<=10?10:raw<=20?20:raw<=50?50:100; maxVal = Math.ceil(maxVal/step)*step; }
    else { maxVal = 5; step = 1; }
    ctx.strokeStyle='#e0cc9e'; ctx.lineWidth=0.8; ctx.fillStyle='#6b5a4a'; ctx.font='10px sans-serif'; ctx.textAlign='right';
    for (let i=0; i<=5; i++) {
      let val = (i/5)*maxVal;
      let y = pad.top + ch - (val/maxVal)*ch;
      ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(cw + pad.left, y); ctx.stroke();
      ctx.fillText(formatDurationLabel(Math.round(val)), pad.left-6, y+3);
    }
    let barW = Math.max(6, cw/dates.length-2);
    datasets.forEach(ds => {
      ctx.strokeStyle = ds.color; ctx.fillStyle = ds.color; ctx.lineWidth = 2.2;
      ctx.beginPath();
      dates.forEach((d,i) => { let val = ds.values[i]||0; let x = pad.left + i*barW + barW/2; let y = pad.top + ch - (val/maxVal)*ch; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
      ctx.stroke();
      dates.forEach((d,i) => {
        let val = ds.values[i]||0;
        let x = pad.left + i*barW + barW/2;
        let y = pad.top + ch - (val/maxVal)*ch;
        ctx.beginPath(); ctx.arc(x,y,3.5,0,Math.PI*2); ctx.fill();
        if(val>0) {
          ctx.fillStyle='#333'; ctx.font='bold 9px sans-serif'; ctx.textAlign='center';
          ctx.fillText(formatDurationLabel(val), x, y-8);
          ctx.fillStyle=ds.color;
        }
      });
    });
    ctx.fillStyle='#6b5a4a'; ctx.font='9px sans-serif'; ctx.textAlign='center';
    let stepX = Math.max(1, Math.floor(dates.length/8));
    dates.forEach((d,i) => { if(i%stepX===0){ let x = pad.left + i*barW + barW/2; ctx.fillText(d.slice(-2), x, 220-6); } });
  }

      });
      els.summary.innerHTML = `📊 合计 <b>${formatDurationLabel(grandTotal)}</b> · 共${selectedFilters.length}项`;
      drawChart(dates, datasets);
      els.legend.innerHTML = legendHTML || '<span style="color:#999">请选择任务</span>';
    }
    renderFilters();
  }

  function renderFilters() {
    els.filterBox.innerHTML = '';
    let allChip = document.createElement('span');
    allChip.className = 'filter-chip' + (selectedFilters.includes('all')?' active':'');
    allChip.textContent = '📊 全部';
    allChip.addEventListener('click', ()=>{ selectedFilters=['all']; updateAnalysis(); });
    els.filterBox.appendChild(allChip);
    ALL_TASKS.forEach(t => {
      let chip = document.createElement('span');
      chip.className = 'filter-chip' + (selectedFilters.includes(t.id)?' active':'');
      chip.textContent = t.emoji+' '+t.title;
      chip.addEventListener('click', ()=>{
        if (selectedFilters.includes('all')) selectedFilters = [];
        let idx = selectedFilters.indexOf(t.id);
        if (idx>-1) selectedFilters.splice(idx,1); else selectedFilters.push(t.id);
        if (selectedFilters.length===0) selectedFilters=['all'];
        updateAnalysis();
      });
      els.filterBox.appendChild(chip);
    });
  }

  $('analysisBtn').addEventListener('click', ()=>{ els.analysis.classList.toggle('show'); if(els.analysis.classList.contains('show')) updateAnalysis(); });
  $('prevMonthBtn').addEventListener('click', ()=>{ analysisYM = analysisYM==='2026-06'?'2026-08':analysisYM==='2026-07'?'2026-06':'2026-07'; updateAnalysis(); });
  $('nextMonthBtn').addEventListener('click', ()=>{ analysisYM = analysisYM==='2026-06'?'2026-07':analysisYM==='2026-07'?'2026-08':'2026-06'; updateAnalysis(); });

  if (document.getElementById('coverPage').classList.contains('hidden')) renderAll();
})();
</script>
</body>
</html>
